<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>貪食蛇</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      user-select: none;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      color: #4ecca3;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1rem;
      color: #aaa;
    }

    #scoreboard span { color: #4ecca3; font-weight: bold; }

    canvas {
      border: 2px solid #4ecca3;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(78, 204, 163, 0.3);
      background: #16213e;
      display: block;
    }

    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    #overlay h2 {
      font-size: 2rem;
      color: #e94560;
      letter-spacing: 2px;
    }

    #overlay p { color: #aaa; font-size: 0.95rem; }

    #overlay button {
      margin-top: 8px;
      padding: 10px 32px;
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    #overlay button:hover { background: #38b28a; }

    #controls {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #555;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <h1>貪食蛇</h1>
  <div id="scoreboard">
    Score: <span id="score">0</span>&nbsp;&nbsp;|&nbsp;&nbsp;Best: <span id="best">0</span>
  </div>

  <div style="position:relative;">
    <canvas id="game" width="400" height="400"></canvas>
    <div id="overlay">
      <h2 id="overlay-title">SNAKE</h2>
      <p id="overlay-msg">Use arrow keys or WASD to move</p>
      <button id="start-btn">Start Game</button>
    </div>
  </div>

  <div id="controls">
    Arrow Keys / WASD — Move &nbsp;|&nbsp; Space / P — Pause
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;

    let snake, dir, nextDir, foods, superFood, score, best, gameLoop, state;

    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg   = document.getElementById('overlay-msg');
    const startBtn = document.getElementById('start-btn');

    best = parseInt(localStorage.getItem('snakeBest') || '0');
    bestEl.textContent = best;

    function init() {
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = 0;
      foods = [];
      placeFood();
      placeFood();
      superFood = null;
      placeSuperFood();
      state = 'running';
    }

    function placeSuperFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS),
        };
      } while (
        snake.some(s => s.x === pos.x && s.y === pos.y) ||
        foods.some(f => f.x === pos.x && f.y === pos.y)
      );
      superFood = pos;
    }

    function placeFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS),
        };
      } while (
        snake.some(s => s.x === pos.x && s.y === pos.y) ||
        foods.some(f => f.x === pos.x && f.y === pos.y)
      );
      foods.push(pos);
    }

    function updateScore(pts) {
      score += pts;
      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('snakeBest', best);
      }
    }

    function step() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wrap around edges
      head.x = (head.x + COLS) % COLS;
      head.y = (head.y + ROWS) % ROWS;
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return endGame();
      }

      snake.unshift(head);

      const eatenIndex = foods.findIndex(f => f.x === head.x && f.y === head.y);
      if (eatenIndex !== -1) {
        foods.splice(eatenIndex, 1);
        // grow by 1 at the tail — tail is already kept by skipping pop
        updateScore(1);
        placeFood();
      } else if (superFood && head.x === superFood.x && head.y === superFood.y) {
        // grow by 2 at the tail: skip pop (= +1) and push a duplicate tail (= +2)
        snake.push({ ...snake[snake.length - 1] });
        superFood = null;
        updateScore(2);
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid dots
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.fillRect(x * CELL + CELL / 2 - 1, y * CELL + CELL / 2 - 1, 2, 2);
        }
      }

      // Super food (star)
      if (superFood) {
        const sfx = superFood.x * CELL + CELL / 2;
        const sfy = superFood.y * CELL + CELL / 2;
        const outer = CELL / 2 - 1;
        const inner = outer * 0.45;
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const angle = (i * Math.PI) / 5 - Math.PI / 2;
          const r = i % 2 === 0 ? outer : inner;
          i === 0
            ? ctx.moveTo(sfx + r * Math.cos(angle), sfy + r * Math.sin(angle))
            : ctx.lineTo(sfx + r * Math.cos(angle), sfy + r * Math.sin(angle));
        }
        ctx.closePath();
        ctx.fillStyle = '#ffd700';
        ctx.fill();
        ctx.strokeStyle = '#ff8c00';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      // Food
      foods.forEach(food => {
        const fx = food.x * CELL + CELL / 2;
        const fy = food.y * CELL + CELL / 2;
        ctx.beginPath();
        ctx.arc(fx, fy, CELL / 2 - 2, 0, Math.PI * 2);
        ctx.fillStyle = '#e94560';
        ctx.fill();
      });

      // Snake body (triangles)
      snake.forEach((seg, i) => {
        const t = i / snake.length;
        const color = i === 0
          ? '#4ecca3'
          : `hsl(${160 - t * 40}, 70%, ${50 - t * 15}%)`;
        const cx = seg.x * CELL + CELL / 2;
        const cy = seg.y * CELL + CELL / 2;
        const half = CELL / 2 - 1;

        // Determine direction this segment is pointing
        let dx = 0, dy = 0;
        if (i === 0) {
          dx = dir.x; dy = dir.y;
        } else {
          dx = snake[i - 1].x - seg.x;
          dy = snake[i - 1].y - seg.y;
          if (dx > 1) dx = -1; else if (dx < -1) dx = 1;
          if (dy > 1) dy = -1; else if (dy < -1) dy = 1;
        }

        ctx.beginPath();
        if (dx === 1) {
          ctx.moveTo(cx + half, cy);
          ctx.lineTo(cx - half, cy - half);
          ctx.lineTo(cx - half, cy + half);
        } else if (dx === -1) {
          ctx.moveTo(cx - half, cy);
          ctx.lineTo(cx + half, cy - half);
          ctx.lineTo(cx + half, cy + half);
        } else if (dy === -1) {
          ctx.moveTo(cx, cy - half);
          ctx.lineTo(cx - half, cy + half);
          ctx.lineTo(cx + half, cy + half);
        } else {
          ctx.moveTo(cx, cy + half);
          ctx.lineTo(cx - half, cy - half);
          ctx.lineTo(cx + half, cy - half);
        }
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
      });
    }

    function endGame() {
      clearInterval(gameLoop);
      state = 'dead';
      overlayTitle.textContent = 'GAME OVER';
      overlayMsg.textContent = `Score: ${score}`;
      startBtn.textContent = 'Play Again';
      overlay.style.display = 'flex';
    }

    function startGame() {
      overlay.style.display = 'none';
      clearInterval(gameLoop);
      init();
      draw();
      gameLoop = setInterval(step, 120);
    }

    startBtn.addEventListener('click', startGame);

    document.addEventListener('keydown', e => {
      const map = {
        ArrowUp:    { x: 0, y: -1 },
        ArrowDown:  { x: 0, y:  1 },
        ArrowLeft:  { x: -1, y: 0 },
        ArrowRight: { x:  1, y: 0 },
        w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
        s: { x: 0, y:  1 }, S: { x: 0, y:  1 },
        a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
        d: { x:  1, y: 0 }, D: { x:  1, y: 0 },
      };

      if (map[e.key]) {
        e.preventDefault();
        const d = map[e.key];
        // Prevent reversing direction
        if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
      }

      if ((e.key === 'p' || e.key === 'P' || e.key === ' ') && state === 'running') {
        clearInterval(gameLoop);
        state = 'paused';
        overlayTitle.textContent = 'PAUSED';
        overlayMsg.textContent = 'Press P or click Resume to continue';
        startBtn.textContent = 'Resume';
        overlay.style.display = 'flex';
      } else if ((e.key === 'p' || e.key === 'P' || e.key === ' ') && state === 'paused') {
        overlay.style.display = 'none';
        state = 'running';
        gameLoop = setInterval(step, 120);
      }
    });
  </script>
</body>
</html>
